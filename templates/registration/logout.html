{% extends 'base.html' %}
{% block title %}Chiusura Sessione{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card fortress-card p-4 text-center border-0 shadow">
            <div class="display-1 text-warning mb-3">🚪</div>
            <h3>Vuoi uscire dalla Fortezza?</h3>
            <p class="text-muted">La tua sessione verrà terminata e le chiavi di decriptazione rimosse dalla memoria temporanea.</p>
            
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-danger btn-lg">Sì, chiudi sessione</button>
                    <a href="{#% url 'dashboard' %#}" class="btn btn-link text-secondary">No, resta collegato</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
