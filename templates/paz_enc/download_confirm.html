{% extends 'base.html' %}
{% block content %}
<div class="card fortress-card p-4 text-center">
    <h3>Verifica Integrità Superata</h3>
    <div class="alert alert-info my-3">
        <code>SHA-256: {{ documento.file_hash }}</code>
    </div>
    <p>Il file è integro e pronto per il download sicuro.</p>
    <a href="?confirm=true" class="btn btn-primary btn-lg">Clicca per scaricare</a>
</div>
{% endblock %}
