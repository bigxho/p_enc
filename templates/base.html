<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Fortezza Digitale{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #212529; }
        .fortress-card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'lista_documenti' %}">🛡️ Protection Data</a>
            {% if user.is_authenticated %}
                     
                <form action="{% url 'logout' %}" method="post" class="d-inline">
                    {% csrf_token %}
                    <strong class="navbar-text text-white"> Utente:: {{ user.username }}</strong> |
                    <button type="submit" class="btn btn-sm btn-outline-danger"> Logout </button> 
                    <a href="admin/" class="btn btn-accent btn-sm text-white border-white"> Admin </a>                 </form>
                    {% else %}
                        <a href="{% url 'login' %}" class="btn btn-accent btn-sm text-white border-white">
                            Accedi
                        </a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        
        {% block content %}{% endblock %}
    </div>
</body>
</html>
