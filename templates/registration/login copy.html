{% extends 'base.html' %}
{% block title %}Accesso alla Fortezza{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card fortress-card p-4">
            <h3 class="text-center mb-4">Identificazione</h3>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Accedi</button>
            </form>
            
            <hr>
            
            <div class="text-center">
                <p class="text-muted small">Protezione attiva: 5 tentativi/5 min</p>
                <a href="{% url 'mfa_authenticate' %}" class="btn btn-outline-dark btn-sm">
                    🔑 Accedi con FaceID / TouchID
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
