{% extends 'base.html' %}
{% block title %}Accesso Riservato - Fortezza{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card fortress-card p-4 border-0 shadow-lg">
            <div class="text-center mb-4">
                <div class="display-4 mb-2">🛡️</div>
                <h3>Identificazione</h3>
                <p class="text-muted small">Accesso protetto</p>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Username</label>
                    <input type="text" name="username" class="form-control form-control-lg" placeholder="Inserisci username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Password</label>
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Accedi alla Fortezza</button>
                </div>
            </form>

            <div class="relative my-4">
                <hr>
                <span class="position-absolute top-50 start-50 translate-middle bg-white px-2 text-muted small">OPPURE</span>
            </div>

            <div class="text-center">
                <a href="{#% url 'mfa_authenticate' %#}" class="btn btn-outline-dark w-100">
                    🔑 Accedi con FaceID / TouchID
                </a>
                <p class="mt-3 text-danger small">
                    <i class="bi bi-shield-lock"></i> Protezione attiva: 5 tentativi ogni 5 minuti.
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
